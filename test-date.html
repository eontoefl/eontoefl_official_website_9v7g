<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>날짜 이벤트 테스트</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #log { background: #f0f0f0; padding: 15px; margin-top: 20px; border-radius: 8px; font-size: 14px; line-height: 1.8; }
        input[type="date"] { font-size: 18px; padding: 10px; width: 100%; }
    </style>
</head>
<body>
    <h2>날짜 선택 이벤트 테스트</h2>
    <p>아래 날짜 칸을 탭해보세요. 어떤 이벤트가 발생하는지 아래에 기록됩니다.</p>
    <input type="date" id="testDate">
    <div id="log">이벤트 기록:</div>
    <script>
        const input = document.getElementById('testDate');
        const log = document.getElementById('log');
        let count = 0;
        
        function addLog(msg) {
            count++;
            log.innerHTML += '<br>' + count + '. ' + msg + ' (값: "' + input.value + '")';
        }
        
        input.addEventListener('focus', function() { addLog('🟢 focus 발생'); });
        input.addEventListener('blur', function() { addLog('🔴 blur 발생'); });
        input.addEventListener('change', function() { addLog('🟡 change 발생'); });
        input.addEventListener('click', function() { addLog('👆 click 발생'); });
        input.addEventListener('touchstart', function() { addLog('📱 touchstart 발생'); });
        input.addEventListener('input', function() { addLog('✏️ input 발생'); });
    </script>
</body>
</html>
