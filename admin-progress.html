    <!-- ===== 진행률 대시보드 전용 스타일 (progress-wrap 스코핑) ===== -->
    <style>
        .progress-wrap {
            font-family: 'Noto Sans KR', -apple-system, sans-serif;
            background: #f0edf5;
            color: #1e1e2f;
            min-height: calc(100vh - 60px);
        }

        .progress-wrap .dashboard-header {
            background: linear-gradient(135deg, #9480c5, #7a66b0);
            padding: 24px;
            text-align: center;
            color: #fff;
            position: sticky;
            top: 60px;
            z-index: 90;
        }
        .progress-wrap .dashboard-header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .progress-wrap .dashboard-header p { font-size: 13px; opacity: 0.85; }

        .progress-wrap .controls {
            max-width: 1200px;
            margin: 16px auto;
            padding: 0 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .progress-wrap .controls select, .progress-wrap .controls button {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px;
            padding: 10px 16px;
            border-radius: 10px;
            border: 1.5px solid #d8d0eb;
            background: #fff;
            color: #1e1e2f;
            cursor: pointer;
        }
        .progress-wrap .controls button {
            background: #9480c5;
            color: #fff;
            border-color: #9480c5;
            font-weight: 600;
        }
        .progress-wrap .controls button:hover { background: #7a66b0; }
        .progress-wrap .controls button.loading { opacity: 0.6; pointer-events: none; }

        .progress-wrap .summary-bar {
            max-width: 1200px;
            margin: 0 auto 16px;
            padding: 0 16px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .progress-wrap .summary-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
        }
        .progress-wrap .summary-card .label { font-size: 11px; color: #999; font-weight: 600; margin-bottom: 4px; }
        .progress-wrap .summary-card .value { font-size: 24px; font-weight: 800; }
        .progress-wrap .summary-card .value.total { color: #9480c5; }
        .progress-wrap .summary-card .value.done { color: #5ea065; }
        .progress-wrap .summary-card .value.missing { color: #d94452; }
        .progress-wrap .summary-card .value.urgent { color: #e67e22; }

        .progress-wrap .timeline {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px 40px;
        }

        .progress-wrap .week-section {
            margin-bottom: 24px;
        }
        .progress-wrap .week-title {
            font-size: 16px;
            font-weight: 700;
            color: #9480c5;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-wrap .day-card {
            background: #fff;
            border-radius: 14px;
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
            border: 1px solid #eeeaf5;
        }
        .progress-wrap .day-card.today { border: 2px solid #9480c5; }
        .progress-wrap .day-card.past { opacity: 0.6; }
        .progress-wrap .day-card.past.all-done { opacity: 0.45; }
        .progress-wrap .day-card.future.all-done { opacity: 1; }
        .progress-wrap .day-card.has-missing { background: #fff; border: 2px solid #e74c5e; }
        .progress-wrap .day-card.has-missing .day-header { background: #fff; }

        .progress-wrap .day-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: #faf9fd;
            border-bottom: 1px solid #f0edf5;
            cursor: pointer;
        }
        .progress-wrap .day-header:hover { background: #f5f3fa; }
        .progress-wrap .day-header .day-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .progress-wrap .day-header .day-date {
            font-size: 13px;
            font-weight: 700;
            color: #1e1e2f;
        }
        .progress-wrap .day-header .day-label {
            font-size: 12px;
            color: #999;
            font-weight: 500;
        }
        .progress-wrap .day-header .day-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .progress-wrap .day-badge.today-badge { background: #9480c5; color: #fff; }
        .progress-wrap .day-badge.past-badge { background: #e8e4f0; color: #999; }
        .progress-wrap .day-badge.future-badge { background: #f0faf1; color: #5ea065; }
        .progress-wrap .day-badge.urgent-badge { background: #fef3e8; color: #e67e22; }

        .progress-wrap .day-header .day-stats {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
        }
        .progress-wrap .day-stats .done { color: #5ea065; }
        .progress-wrap .day-stats .missing { color: #d94452; }

        .progress-wrap .day-body {
            padding: 16px 20px;
            display: none;
        }
        .progress-wrap .day-body.open { display: block; }

        .progress-wrap .task-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f5f3fa;
        }
        .progress-wrap .task-row:last-child { border-bottom: none; }

        .progress-wrap .task-name {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
        }

        .progress-wrap .set-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .progress-wrap .set-chip {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .progress-wrap .set-chip.exists { background: #d4f5d6; color: #3a9142; }
        .progress-wrap .set-chip.missing { background: #fde8ea; color: #d94452; }
        .progress-wrap .set-chip.loading { background: #e8e4f0; color: #999; }

        .progress-wrap .legend {
            max-width: 1200px;
            margin: 0 auto 16px;
            padding: 0 16px;
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #999;
        }
        .progress-wrap .legend span { display: flex; align-items: center; gap: 4px; }
        .progress-wrap .legend .dot {
            width: 10px; height: 10px; border-radius: 50%; display: inline-block;
        }
        .progress-wrap .dot.green { background: #5ea065; }
        .progress-wrap .dot.red { background: #d94452; }
        .progress-wrap .dot.gray { background: #ccc; }

        @media (max-width: 640px) {
            .progress-wrap .summary-bar { grid-template-columns: repeat(2, 1fr); }
            .progress-wrap .controls { flex-direction: column; }
        }
    </style>
</head>

    <!-- Supabase 설정 (공홈과 동일한 config 사용) -->
    <script src="js/supabase-config.js"></script>
    <script src="js/admin-utils.js"></script>

    <script>
    // ============================================
    // Supabase fetch helper
    // ============================================
    async function supabaseFetch(table, query = '') {
        const url = `${SUPABASE_URL}/rest/v1/${table}?${query}`;
        const res = await fetch(url, {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            }
        });
        if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
        return await res.json();
    }

    // ============================================
    // DB에서 스케줄 데이터 로드
    // ============================================
    async function loadScheduleFromDB(program) {
        if (program === 'practice') {
            // tr_practice_schedule: { practice_number, tasks[] }
            const rows = await supabaseFetch('tr_practice_schedule', 'select=practice_number,tasks&order=practice_number.asc&limit=500');
            return rows.map(r => ({
                practiceNum: r.practice_number,
                tasks: r.tasks || []
            }));
        } else {
            // tr_schedule_assignment: { program, week, day, section1~4 }
            const rows = await supabaseFetch('tr_schedule_assignment', `select=week,day,section1,section2,section3,section4&program=eq.${program}&order=week.asc,id.asc&limit=500`);
            // { week -> { day -> tasks[] } }
            const schedule = {};
            rows.forEach(r => {
                const wk = r.week;
                if (!schedule[wk]) schedule[wk] = {};
                const tasks = [r.section1, r.section2, r.section3, r.section4].filter(s => s && s.trim());
                schedule[wk][r.day] = tasks;
            });
            return schedule;
        }
    }

    // ============================================
    // 모듈 -> 세트 매핑 (기존과 동일)
    // ============================================
    function getRequiredSets(taskName) {
        const sets = [];

        const readingMatch = taskName.match(/리딩 Module\s+(\d+)/);
        if (readingMatch) {
            const m = parseInt(readingMatch[1]);
            const fb1 = (m - 1) * 2 + 1, fb2 = fb1 + 1;
            const d1_1 = (m - 1) * 2 + 1, d1_2 = d1_1 + 1;
            const d2_1 = (m - 1) * 2 + 1, d2_2 = d2_1 + 1;
            const acad = m;
            sets.push(
                { table: 'tr_reading_fillblanks', setId: `fillblank_set_${String(fb1).padStart(4,'0')}`, label: `FB ${fb1}`, field: 'id' },
                { table: 'tr_reading_fillblanks', setId: `fillblank_set_${String(fb2).padStart(4,'0')}`, label: `FB ${fb2}`, field: 'id' },
                { table: 'tr_reading_daily1', setId: `daily1_set_${String(d1_1).padStart(4,'0')}`, label: `D1 ${d1_1}`, field: 'id' },
                { table: 'tr_reading_daily1', setId: `daily1_set_${String(d1_2).padStart(4,'0')}`, label: `D1 ${d1_2}`, field: 'id' },
                { table: 'tr_reading_daily2', setId: `daily2_set_${String(d2_1).padStart(4,'0')}`, label: `D2 ${d2_1}`, field: 'id' },
                { table: 'tr_reading_daily2', setId: `daily2_set_${String(d2_2).padStart(4,'0')}`, label: `D2 ${d2_2}`, field: 'id' },
                { table: 'tr_reading_academic', setId: `academic_set_${String(acad).padStart(4,'0')}`, label: `Acad ${acad}`, field: 'id' }
            );
        }

        const listeningMatch = taskName.match(/리스닝 Module\s+(\d+)/);
        if (listeningMatch) {
            const m = parseInt(listeningMatch[1]);
            const resp = m;
            const conv1 = (m - 1) * 3 + 1;
            const ann1 = (m - 1) * 3 + 1;
            const lec1 = (m - 1) * 2 + 1;
            sets.push({ table: 'tr_listening_response', setId: `response_set_${String(resp).padStart(4,'0')}`, label: `Resp ${resp}`, field: 'set_id' });
            for (let i = 0; i < 3; i++) {
                sets.push({ table: 'tr_listening_conversation', setId: `conversation_set_${String(conv1+i).padStart(4,'0')}`, label: `Conv ${conv1+i}`, field: 'id' });
            }
            for (let i = 0; i < 3; i++) {
                sets.push({ table: 'tr_listening_announcement', setId: `announcement_set_${String(ann1+i).padStart(4,'0')}`, label: `Ann ${ann1+i}`, field: 'id' });
            }
            for (let i = 0; i < 2; i++) {
                sets.push({ table: 'tr_listening_lecture', setId: `lecture_set_${String(lec1+i).padStart(4,'0')}`, label: `Lec ${lec1+i}`, field: 'id' });
            }
        }

        const writingMatch = taskName.match(/라이팅\s+(\d+)/);
        if (writingMatch) {
            const n = parseInt(writingMatch[1]);
            sets.push(
                { table: 'tr_writing_arrange', setId: `arrange_set_${String(n).padStart(4,'0')}`, label: `Arr ${n}`, field: 'set_id' },
                { table: 'tr_writing_email', setId: `email_set_${String(n).padStart(4,'0')}`, label: `Email ${n}`, field: 'id' },
                { table: 'tr_writing_discussion', setId: `discussion_set_${String(n).padStart(4,'0')}`, label: `Disc ${n}`, field: 'id' }
            );
        }

        const speakingMatch = taskName.match(/스피킹\s+(\d+)/);
        if (speakingMatch) {
            const n = parseInt(speakingMatch[1]);
            sets.push(
                { table: 'tr_speaking_repeat', setId: `repeat_set_${String(n).padStart(4,'0')}`, label: `Repeat ${n}`, field: 'id' },
                { table: 'tr_speaking_interview', setId: `interview_set_${String(n).padStart(4,'0')}`, label: `Intv ${n}`, field: 'id' }
            );
        }

        return sets;
    }

    // ============================================
    // Supabase에서 존재하는 세트 ID 일괄 조회
    // ============================================
    async function loadExistingSets() {
        const results = {};
        const tables = [
            { name: 'tr_reading_fillblanks', query: 'select=id&order=id.asc', field: 'id' },
            { name: 'tr_reading_daily1', query: 'select=id&order=id.asc', field: 'id' },
            { name: 'tr_reading_daily2', query: 'select=id&order=id.asc', field: 'id' },
            { name: 'tr_reading_academic', query: 'select=id&order=id.asc', field: 'id' },
            { name: 'tr_listening_response', query: 'select=set_id&order=set_id.asc', field: 'set_id' },
            { name: 'tr_listening_conversation', query: 'select=id&order=id.asc', field: 'id' },
            { name: 'tr_listening_announcement', query: 'select=id&order=id.asc', field: 'id' },
            { name: 'tr_listening_lecture', query: 'select=id&order=id.asc', field: 'id' },
            { name: 'tr_writing_arrange', query: 'select=set_id&order=set_id.asc', field: 'set_id' },
            { name: 'tr_writing_email', query: 'select=id&order=id.asc', field: 'id' },
            { name: 'tr_writing_discussion', query: 'select=id&order=id.asc', field: 'id' },
            { name: 'tr_speaking_repeat', query: 'select=id&order=id.asc', field: 'id' },
            { name: 'tr_speaking_interview', query: 'select=id&order=id.asc', field: 'id' }
        ];
        await Promise.all(tables.map(async (t) => {
            try {
                const rows = await supabaseFetch(t.name, t.query);
                const ids = new Set();
                rows.forEach(row => {
                    const val = row[t.field];
                    if (val !== null && val !== undefined) ids.add(String(val));
                });
                results[t.name] = ids;
                console.log(`📦 ${t.name} (${t.field}):`, [...ids].slice(0, 10));
            } catch (e) {
                console.error(`❌ ${t.name} 조회 실패:`, e);
                results[t.name] = new Set();
            }
        }));
        return results;
    }

    // ============================================
    // 날짜 계산 (fast/standard 전용)
    // ============================================
    const DAY_ORDER = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
    const DAY_KR = { sunday: '일', monday: '월', tuesday: '화', wednesday: '수', thursday: '목', friday: '금', saturday: '토' };

    function getScheduleDates(startDateStr, scheduleData) {
        const startDate = new Date(startDateStr + 'T00:00:00');
        const days = [];
        const weeks = Object.keys(scheduleData).sort((a, b) => a - b);

        weeks.forEach((weekNum, weekIdx) => {
            const weekData = scheduleData[weekNum];
            DAY_ORDER.forEach((dayName, dayIdx) => {
                const tasks = weekData[dayName] || [];
                if (tasks.length === 0) return;
                const date = new Date(startDate);
                date.setDate(startDate.getDate() + (weekIdx * 7) + dayIdx);
                days.push({
                    date: date,
                    dateStr: `${date.getMonth()+1}/${date.getDate()}`,
                    dayName: dayName,
                    dayKr: DAY_KR[dayName],
                    weekNum: parseInt(weekNum),
                    tasks: tasks
                });
            });
        });
        return days;
    }

    // ============================================
    // 프로그램 셀렉트 변경 시 시작일 표시/숨김
    // ============================================
    function onProgramChange() {
        const program = document.getElementById('programSelect').value;
        const startDateSelect = document.getElementById('startDateSelect');
        startDateSelect.style.display = program === 'practice' ? 'none' : '';
    }

    // ============================================
    // 과제별 칩 렌더링 (공통)
    // ============================================
    function renderTaskChips(taskName, existingSets, counters, isPast, isToday, isUrgent) {
        const requiredSets = getRequiredSets(taskName);
        if (requiredSets.length === 0) {
            return { html: `<div class="task-row"><div class="task-name">${taskName}</div><div class="set-chips"><span style="font-size:11px;color:#999;">데이터 체크 불필요</span></div></div>`, total: 0, done: 0 };
        }
        let dayDone = 0, dayTotal = 0;
        const chips = requiredSets.map(s => {
            const tableIds = existingSets[s.table] || new Set();
            const exists = tableIds.has(String(s.setId));
            counters.totalSets++;
            dayTotal++;
            if (exists) {
                counters.doneSets++;
                dayDone++;
                return `<span class="set-chip exists"><i class="fas fa-check"></i> ${s.label}</span>`;
            } else {
                counters.missingSets++;
                if (isPast || isToday || isUrgent) counters.urgentSets++;
                return `<span class="set-chip missing"><i class="fas fa-times"></i> ${s.label}</span>`;
            }
        }).join('');
        return { html: `<div class="task-row"><div class="task-name">${taskName}</div><div class="set-chips">${chips}</div></div>`, total: dayTotal, done: dayDone };
    }

    // ============================================
    // 대시보드 렌더링
    // ============================================
    async function loadDashboard() {
        const btn = document.getElementById('refreshBtn');
        btn.classList.add('loading');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 조회 중...';

        const program = document.getElementById('programSelect').value;
        const startDate = document.getElementById('startDateSelect').value;

        try {
            // 병렬: 기존 세트 + 스케줄 데이터 동시 로드
            const [existingSets, scheduleData] = await Promise.all([
                loadExistingSets(),
                loadScheduleFromDB(program)
            ]);
            console.log('✅ 기존 세트 조회 완료:', existingSets);

            const counters = { totalSets: 0, doneSets: 0, missingSets: 0, urgentSets: 0 };
            const timelineHtml = [];

            if (program === 'practice') {
                // ===== Practice 모드: 날짜 없이 순차 나열 =====
                const practiceItems = scheduleData; // [{ practiceNum, tasks }]
                // 10개씩 그룹핑
                const groupSize = 10;
                let currentGroup = 0;

                practiceItems.forEach(item => {
                    const groupNum = Math.ceil(item.practiceNum / groupSize);
                    if (groupNum !== currentGroup) {
                        if (currentGroup > 0) timelineHtml.push('</div>');
                        currentGroup = groupNum;
                        const from = (groupNum - 1) * groupSize + 1;
                        const to = Math.min(groupNum * groupSize, practiceItems.length);
                        timelineHtml.push(`<div class="week-section"><div class="week-title"><i class="fas fa-dumbbell"></i> Practice ${from} ~ ${to}</div>`);
                    }

                    let dayDone = 0, dayTotal = 0;
                    const taskRows = [];

                    item.tasks.forEach(taskName => {
                        const result = renderTaskChips(taskName, existingSets, counters, false, false, false);
                        taskRows.push(result.html);
                        dayTotal += result.total;
                        dayDone += result.done;
                    });

                    const statsHtml = dayTotal > 0
                        ? `<span class="done">${dayDone}✓</span> / <span class="missing">${dayTotal - dayDone}✗</span>`
                        : '';

                    const hasMissing = dayTotal > 0 && dayDone < dayTotal;
                    const allDone = dayTotal > 0 && dayDone === dayTotal;
                    let cardClass = 'future';
                    if (hasMissing) cardClass += ' has-missing';
                    else if (allDone) cardClass += ' all-done';

                    const isOpen = hasMissing ? 'open' : '';

                    timelineHtml.push(`
                        <div class="day-card ${cardClass}">
                            <div class="day-header" onclick="this.nextElementSibling.classList.toggle('open')">
                                <div class="day-info">
                                    <span class="day-date">Practice ${item.practiceNum}</span>
                                    <span class="day-label">${item.tasks.length}개 과제</span>
                                </div>
                                <div class="day-stats">${statsHtml}</div>
                            </div>
                            <div class="day-body ${isOpen}">
                                ${taskRows.join('')}
                            </div>
                        </div>
                    `);
                });
                if (currentGroup > 0) timelineHtml.push('</div>');

            } else {
                // ===== Fast / Standard 모드: 날짜 기반 =====
                const days = getScheduleDates(startDate, scheduleData);
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                let currentWeek = 0;

                days.forEach(day => {
                    if (day.weekNum !== currentWeek) {
                        if (currentWeek > 0) timelineHtml.push('</div>');
                        currentWeek = day.weekNum;
                        timelineHtml.push(`<div class="week-section"><div class="week-title"><i class="fas fa-calendar-week"></i> Week ${currentWeek}</div>`);
                    }

                    const dayDate = new Date(day.date);
                    dayDate.setHours(0, 0, 0, 0);
                    const diffDays = Math.ceil((dayDate - today) / (1000 * 60 * 60 * 24));
                    const isToday = diffDays === 0;
                    const isPast = diffDays < 0;
                    const isUrgent = diffDays > 0 && diffDays <= 3;

                    let dayClass = '';
                    let badgeClass = 'future-badge';
                    let badgeText = `D-${diffDays}`;

                    if (isToday) { dayClass = 'today'; badgeClass = 'today-badge'; badgeText = '오늘'; }
                    else if (isPast) { dayClass = 'past'; badgeClass = 'past-badge'; badgeText = `D+${Math.abs(diffDays)}`; }
                    else if (isUrgent) { badgeClass = 'urgent-badge'; badgeText = `D-${diffDays}`; }

                    let dayDone = 0, dayTotal = 0;
                    const taskRows = [];

                    day.tasks.forEach(taskName => {
                        const result = renderTaskChips(taskName, existingSets, counters, isPast, isToday, isUrgent);
                        taskRows.push(result.html);
                        dayTotal += result.total;
                        dayDone += result.done;
                    });

                    const statsHtml = dayTotal > 0
                        ? `<span class="done">${dayDone}✓</span> / <span class="missing">${dayTotal - dayDone}✗</span>`
                        : '';

                    const hasMissing = dayTotal > 0 && dayDone < dayTotal;
                    const allDone = dayTotal > 0 && dayDone === dayTotal;

                    if (isPast) {
                        if (allDone) dayClass += ' all-done';
                    } else {
                        dayClass += ' future';
                        if (hasMissing) dayClass += ' has-missing';
                        else if (allDone) dayClass += ' all-done';
                    }

                    const isOpen = isToday || isUrgent || (hasMissing && !isPast) ? 'open' : '';

                    timelineHtml.push(`
                        <div class="day-card ${dayClass}">
                            <div class="day-header" onclick="this.nextElementSibling.classList.toggle('open')">
                                <div class="day-info">
                                    <span class="day-date">${day.dateStr} (${day.dayKr})</span>
                                    <span class="day-label">Week${day.weekNum}</span>
                                    <span class="day-badge ${badgeClass}">${badgeText}</span>
                                </div>
                                <div class="day-stats">${statsHtml}</div>
                            </div>
                            <div class="day-body ${isOpen}">
                                ${taskRows.join('')}
                            </div>
                        </div>
                    `);
                });
                if (currentWeek > 0) timelineHtml.push('</div>');
            }

            document.getElementById('timeline').innerHTML = timelineHtml.join('');
            document.getElementById('summaryTotal').textContent = counters.totalSets;
            document.getElementById('summaryDone').textContent = counters.doneSets;
            document.getElementById('summaryMissing').textContent = counters.missingSets;
            document.getElementById('summaryUrgent').textContent = counters.urgentSets;

            const subtitleParts = [program.toUpperCase()];
            if (program !== 'practice') subtitleParts.push(`시작일: ${startDate}`);
            subtitleParts.push(`마지막 조회: ${new Date().toLocaleTimeString('ko-KR')}`);
            document.getElementById('headerSubtitle').textContent = subtitleParts.join(' | ');

        } catch (e) {
            console.error('❌ 대시보드 로드 실패:', e);
            document.getElementById('timeline').innerHTML = `<p style="color:red;text-align:center;">로드 실패: ${e.message}</p>`;
        }

        btn.classList.remove('loading');
        btn.innerHTML = '<i class="fas fa-sync-alt"></i> 새로고침';
    }

    // 페이지 로드 시 자동 실행
    window.addEventListener('DOMContentLoaded', () => {
        onProgramChange();
        loadDashboard();
    });
    </script>
</body>
