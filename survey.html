<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실전 리포트 - 이온토플</title>
    <link rel="icon" type="image/png" href="https://eontoefl.github.io/eontoefl_official_website_9v7g/logo/purple2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ================================================================
           DESIGN.md (Ethereal Dashboard) 적용 — 학생 실전 리포트
           - No-Line: 보기·인풋의 테두리 제거, 톤 배경으로 경계 표현
           - Layering: 회색 surface 위 흰 카드, 그 안의 보기는 다시 톤으로
           - 정적 카드엔 그림자 없음(톤 리프트), 그림자는 CTA 등 인터랙티브에만
           - CTA는 시그니처 그라디언트(브랜드 보라), 포커스는 아웃라인
        ================================================================ */
        :root {
            /* 카드가 흰색이므로, 분리가 '보이려면' 바닥은 한 단계 가라앉은 톤이어야 한다
               (DESIGN.md 레이어링: lowest 카드는 low 표면 위에) */
            --sv-surface: #eef0f3;
            --sv-card: #ffffff;
            --sv-low: #f3f4f5;
            --sv-high: #eaecef;
            --sv-on: #191c1d;
            --sv-onvar: #3e484f;
            --sv-muted: #8b939a;
            --sv-primary: #9480c5;
            --sv-primary-soft: rgba(148, 128, 197, 0.12);
            --sv-focus: #c9bce8;
        }
        body { background: var(--sv-surface); font-family: 'Noto Sans KR', sans-serif; }

        .sv-wrap {
            max-width: 560px;
            margin: 0 auto;
            padding: 36px 16px 72px;
        }
        .sv-logo { text-align: center; margin-bottom: 22px; }
        .sv-logo img { height: 34px; }

        /* 카드: 무테 흰 표면 — 회색 surface 위 톤 리프트 */
        .sv-card {
            background: var(--sv-card);
            border-radius: 20px;
            padding: 28px 26px;
            margin-bottom: 20px;
            /* 사방으로 은은하게 — 경계선 대신 공기감으로 분리 (ambient) */
            box-shadow: 0 2px 10px rgba(25, 28, 29, 0.04), 0 10px 28px rgba(25, 28, 29, 0.05);
        }
        .sv-title {
            font-size: 1.28rem; font-weight: 800; color: var(--sv-on);
            letter-spacing: -0.02em; margin-bottom: 8px;
        }
        .sv-sub { font-size: 0.88rem; color: var(--sv-onvar); line-height: 1.7; }

        .sv-exam-badge {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 16px; padding: 8px 15px;
            background: var(--sv-primary-soft); color: #6a5fa0;
            border-radius: 9999px; font-size: 0.82rem; font-weight: 700;
        }
        .sv-date-row { margin-top: 16px; }
        .sv-date-row label {
            font-size: 0.82rem; font-weight: 600; color: var(--sv-onvar);
            display: block; margin-bottom: 7px;
        }
        .sv-date-row input[type="date"] {
            width: 100%; padding: 12px 15px;
            background: var(--sv-high); border: none; border-radius: 12px;
            font-size: 0.95rem; font-family: inherit; color: var(--sv-on);
            box-sizing: border-box; outline: 2px solid transparent;
            transition: outline-color 0.15s;
        }
        .sv-date-row input[type="date"]:focus { outline: 2px solid var(--sv-focus); }

        .sv-q-text {
            font-size: 1rem; font-weight: 700; color: var(--sv-on);
            letter-spacing: -0.01em; margin-bottom: 14px; line-height: 1.55;
        }
        .sv-q-num {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; margin-right: 8px;
            background: linear-gradient(135deg, #9480c5, #b9ace2);
            color: #fff; border-radius: 7px; font-size: 0.78rem; font-weight: 800;
            vertical-align: middle;
        }

        /* 보기: 무테 톤 행 — 선택은 보라 톤으로 */
        .sv-opt {
            display: flex; align-items: center; gap: 11px;
            padding: 13px 15px; margin-bottom: 8px;
            background: var(--sv-low); border: none; border-radius: 12px;
            cursor: pointer; transition: background 0.15s;
            font-size: 0.93rem; color: var(--sv-onvar);
        }
        .sv-opt:hover { background: var(--sv-high); }
        .sv-opt input { accent-color: var(--sv-primary); width: 17px; height: 17px; flex-shrink: 0; }
        .sv-opt.sv-opt-on { background: var(--sv-primary-soft); color: #4d3f7a; font-weight: 700; }

        .sv-q textarea {
            width: 100%; min-height: 100px; padding: 13px 15px;
            background: var(--sv-high); border: none; border-radius: 12px;
            font-size: 0.93rem; font-family: inherit; color: var(--sv-on); resize: vertical;
            box-sizing: border-box; outline: 2px solid transparent;
            transition: outline-color 0.15s;
        }
        .sv-q textarea:focus { outline: 2px solid var(--sv-focus); }
        .sv-q textarea::placeholder { color: var(--sv-muted); }

        /* 필수 표시: 빨간 별 + 상단 안내 */
        .sv-req { color: #ba1a1a; font-weight: 800; margin-left: 5px; }
        .sv-required-note {
            margin-top: 16px; padding: 12px 15px;
            background: var(--sv-low); border-radius: 11px;
            font-size: 0.82rem; color: var(--sv-onvar); font-weight: 600;
        }

        /* CTA: 시그니처 그라디언트 — 인터랙티브 요소라 은은한 글로우 허용 */
        .sv-submit {
            width: 100%; padding: 16px; margin-top: 6px;
            background: linear-gradient(135deg, #9480c5 0%, #b9ace2 100%);
            color: #fff; border: none; border-radius: 14px;
            font-size: 1rem; font-weight: 800; font-family: inherit; cursor: pointer;
            box-shadow: 0 8px 24px rgba(148, 128, 197, 0.26);
            transition: transform 0.15s;
        }
        .sv-submit:hover { transform: translateY(-2px); }
        .sv-submit:disabled { opacity: 0.6; cursor: default; transform: none; }

        .sv-state { text-align: center; padding: 56px 20px; }
        .sv-state i { font-size: 2.6rem; color: var(--sv-focus); margin-bottom: 16px; display: block; }
        .sv-state h2 {
            font-size: 1.15rem; font-weight: 800; color: var(--sv-on);
            letter-spacing: -0.02em; margin-bottom: 8px;
        }
        .sv-state p { font-size: 0.88rem; color: var(--sv-onvar); line-height: 1.7; }
    </style>
</head>
<body>
    <div class="sv-wrap">
        <div class="sv-logo">
            <a href="index.html"><img src="https://eontoefl.github.io/eontoefl_official_website_9v7g/logo/purple2.png" alt="이온토플"></a>
        </div>

        <!-- 로딩 -->
        <div class="sv-card sv-state" id="svLoading">
            <i class="fas fa-spinner fa-spin"></i>
            <p>불러오는 중...</p>
        </div>

        <!-- 진행 중인 리포트 없음 -->
        <div class="sv-card sv-state" id="svEmpty" style="display:none;">
            <i class="fas fa-mug-hot"></i>
            <h2>지금은 진행 중인 리포트가 없어요</h2>
            <p>다음 시험 후에 다시 열릴 예정이에요.<br>그때 또 부탁드릴게요!</p>
        </div>

        <!-- 제출 완료 -->
        <div class="sv-card sv-state" id="svDone" style="display:none;">
            <i class="fas fa-circle-check" style="color:#77bf7e;"></i>
            <h2>리포트 감사합니다! 🙏</h2>
            <p>보내주신 정보는 검증을 거쳐<br>다음 기수 연습 자료에 그대로 반영돼요.</p>
        </div>

        <!-- 설문 폼 -->
        <div id="svForm" style="display:none;">
            <div class="sv-card">
                <div class="sv-title">📋 실전 리포트</div>
                <div class="sv-sub">
                    방금 본 시험, 기억이 생생할 때 남겨주세요.<br>
                    보내주신 리포트는 다음 기수의 연습 자료를 실전에 더 가깝게 만드는 데 쓰여요.
                </div>
                <div id="svExamInfo"></div>
                <div class="sv-required-note"><span class="sv-req">*</span> 모든 항목이 필수예요. 전부 작성해야 보낼 수 있어요.</div>
            </div>
            <div id="svQuestions"></div>
            <button class="sv-submit" id="svSubmitBtn" onclick="submitSurvey()">
                <i class="fas fa-paper-plane"></i> 리포트 보내기
            </button>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/survey.js"></script>
</body>
</html>
